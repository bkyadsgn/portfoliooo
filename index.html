    function FigmaPortfolio() {
      const [tabs, setTabs] = useState([{ id: "home", kind: "home", label: "Untitled" }]);
      const [activeTabId, setActiveTabId] = useState("home");
      const [isFullscreen, setIsFullscreen] = useState(false);
      const [plusOpen, setPlusOpen] = useState(false);
      const rootRef = useRef(null);

      const activeTab = tabs.find((t) => t.id === activeTabId) || tabs[0];

      const openCaseTab = (caseId) => {
        const existing = tabs.find((t) => t.kind === "case" && t.caseId === caseId);
        if (existing) { setActiveTabId(existing.id); return; }
        const newTab = { id: "case-" + caseId + "-" + Date.now(), kind: "case", caseId, label: CASE_STUDIES[caseId].title };
        setTabs((prev) => [...prev, newTab]);
        setActiveTabId(newTab.id);
      };

      const closeTab = (id) => {
        setTabs((prev) => {
          const next = prev.filter((t) => t.id !== id);
          if (next.length === 0) { setActiveTabId("home"); return [{ id: "home", kind: "home", label: "Untitled" }]; }
          if (id === activeTabId) setActiveTabId(next[next.length - 1].id);
          return next;
        });
      };

      const goHome = () => {
        setTabs((prev) => prev.some((t) => t.id === "home") ? prev : [{ id: "home", kind: "home", label: "Untitled" }, ...prev]);
        setActiveTabId("home");
      };

      const toggleFullscreen = () => {
        if (!document.fullscreenElement) rootRef.current?.requestFullscreen?.().then(() => setIsFullscreen(true)).catch(() => {});
        else document.exitFullscreen?.().then(() => setIsFullscreen(false)).catch(() => {});
      };

      useEffect(() => {
        const h = () => setIsFullscreen(!!document.fullscreenElement);
        document.addEventListener("fullscreenchange", h);
        return () => document.removeEventListener("fullscreenchange", h);
      }, []);

      return e("div", {
        ref: rootRef,
        className: "absolute inset-0 flex flex-col font-sans text-[13px] text-neutral-900 bg-[#F5F5F5] overflow-hidden",
        style: { fontFamily: "'Inter', system-ui, -apple-system, sans-serif" },
      },
        e(TopBar, { tabs, activeTabId, setActiveTabId, closeTab, goHome, plusOpen, setPlusOpen, openCaseTab, isFullscreen, toggleFullscreen }),
        activeTab.kind === "home"
          ? e(HomeSurface, { openCaseTab })
          : e(CanvasSurface, { caseId: activeTab.caseId, goHome })
      );
    }

    function TopBar({ tabs, activeTabId, setActiveTabId, closeTab, goHome, plusOpen, setPlusOpen, openCaseTab, isFullscreen, toggleFullscreen }) {
      return e("div", { className: "flex items-center bg-[#E5E5E5] border-b border-neutral-300/60 h-10 px-3 gap-3 select-none relative shrink-0" },

          e("span", { className: "w-3 h-3 rounded-full bg-[#FEBC2E] border border-[#DEA123]" }),
          e("span", { className: "w-3 h-3 rounded-full bg-[#28C840] border border-[#1AAB29]" })
        ),
        e("button", {
          onClick: goHome,
          className: "flex items-center bg-white rounded-t-md px-3 h-7 mt-1 border-t border-x border-neutral-300/60 hover:bg-neutral-50",
          title: "Home",
        }, e(Globe, { size: 14, className: "text-neutral-700" })),

        e("div", { className: "flex items-end gap-0.5 mt-1 h-full flex-1 min-w-0 overflow-x-auto" },
          tabs.map((t) => {
            const isActive = t.id === activeTabId;

        e("button", { onClick: () => navigate({ type: "home" }), className: "flex items-center gap-1.5 text-[12px] text-neutral-500 hover:text-neutral-800 mb-4" },
          e(ArrowLeft, { size: 13 }), " Back to home"
        ),
        e("div", { className: "flex items-center gap-2 mb-2" },
          e("span", { className: "w-3 h-3 rounded-sm bg-[#3B82F6]" }),
          e("span", { className: "text-[11px] uppercase tracking-widest text-neutral-500" }, "Meta")
        ),
        e("h1", { className: "text-[28px] font-bold text-neutral-900 leading-tight" }, "Dive deep into this website"),
        e("p", { className: "text-[14px] text-neutral-600 mt-2" }, "A small note on why this portfolio is presented as a Figma file rather than a regular website."),
        e("div", { className: "mt-6 space-y-4 text-[14px] text-neutral-800 leading-relaxed" },
          e("p", null, "The first thing I show a new client is almost always a Figma file. It's where decisions happen, where ideas get pulled apart and put back together, and where a portfolio actually lives long before it becomes a marketing site. So it felt right to present my work in the same place I do most of it."),
          e("p", null, "Each case study opens as its own .fig tab — pan and zoom through the actual workings: brief stickies, personas, project roadmap, wireframes, and the final design frames. The plus button in the top bar lets you open any project the way you'd open any file."),
          e("p", null, "The \"Visitor\" cursor is you. Hello.")
        ),
        e("div", { className: "grid grid-cols-3 gap-3 mt-8" },
          [{ label: "Designed in", value: "Figma" }, { label: "Built with", value: "React + Tailwind" }, { label: "Lines of code", value: "~1300" }].map((s, i) =>
            e("div", { key: i, className: "border border-neutral-200 rounded-lg p-4 bg-neutral-50" },
              e("div", { className: "text-[18px] font-bold text-neutral-900" }, s.value),
              e("div", { className: "text-[11px] uppercase tracking-wider text-neutral-500 mt-1" }, s.label)
            )
          )
        )
      );
    }

    function RightPanel() {
      return e("aside", { className: "w-64 bg-white border-l border-neutral-200 px-5 py-5 shrink-0 overflow-y-auto" },
        e("div", { className: "flex items-center justify-between mb-5" },
          e("div", { className: "w-8 h-8 rounded bg-[#7B61FF] flex items-center justify-center text-white font-semibold text-[13px]" }, "R")
        ),
        e("h2", { className: "text-[18px] font-bold text-neutral-900" }, "Rebeka Penciakova"),
        e("p", { className: "text-[13px] text-neutral-700 mt-2" }, "Hi! I'm Rebeka, a brand and product designer."),
        e("div", { className: "border-t border-neutral-200 my-4" }),
        e("div", { className: "text-[12px] text-neutral-600 mb-4" }, "Available for hire!"),
        e("div", { className: "text-[12px] font-semibold text-neutral-900 mb-2" }, "Members"),
        e("div", { className: "space-y-2" },
          MEMBERS.map((m, i) =>
            e("div", { key: i, className: "flex items-center gap-2.5" },
              e("div", { className: "flex items-center justify-center rounded-full font-medium text-white shrink-0", style: { width: 22, height: 22, backgroundColor: m.color, fontSize: 10 } }, m.initial),
              e("span", { className: "text-[13px] text-neutral-800" }, m.name, m.you && e("span", { className: "text-neutral-500 ml-1" }, "(You)"))
            )
          ),
          e("button", { className: "flex items-center justify-center w-[22px] h-[22px] rounded-full border border-dashed border-neutral-300 text-neutral-400 hover:border-neutral-500 hover:text-neutral-600 mt-1" }, e(Plus, { size: 12 }))
        )
      );
    }

    function CardModal({ tag, tagColor, description, onClose }) {
      return e("div", { className: "fixed inset-0 z-50 bg-black/50 flex items-center justify-center p-6", onClick: onClose },
        e("div", { className: "bg-white rounded-xl shadow-2xl max-w-xl w-full overflow-hidden", onClick: (ev) => ev.stopPropagation() },
          e("div", { className: "flex items-center justify-between bg-neutral-100 px-4 py-2" },
            e("div", { className: "flex items-center gap-3" },
              e("span", { className: "text-[12px] font-medium text-neutral-700" }, tag),
              e("span", { className: "text-[12px] text-neutral-500" }, "Get to know me")
            ),
            e("button", { onClick: onClose }, e(X, { size: 16, className: "text-neutral-500 hover:text-neutral-800" }))
          ),
          e("div", { className: "bg-[#FCD34D] px-10 py-16 text-center relative overflow-hidden" },
            e("div", { className: "absolute left-6 top-0 bottom-0 w-px bg-neutral-900/40" }),
            e("div", { className: "absolute left-7 top-0 bottom-0 w-px bg-neutral-900/40" }),
            e("div", { className: "absolute left-6 right-6 top-12 border-t-2 border-dashed border-emerald-500" }),
            e("h2", { className: "text-[36px] font-bold text-neutral-900 relative" }, "Get to know me"),
            e("div", { className: "text-[20px] font-bold mt-12 relative", style: { color: tagColor } }, tag),
            e("div", { className: "text-[13px] text-neutral-700 mt-1 relative" }, "by ", e("span", { className: "font-bold" }, "Rebeka Penciakova"))
          ),
          e("div", { className: "px-5 py-4" },
            e("p", { className: "text-[13px] text-neutral-700 leading-relaxed" }, description),
            e("div", { className: "flex justify-end mt-4 gap-2" },
              e("button", { onClick: onClose, className: "px-3 py-1.5 text-[13px] text-neutral-600 hover:text-neutral-900" }, "Close"),
              e("button", { className: "px-3 py-1.5 text-[13px] bg-blue-600 text-white rounded hover:bg-blue-700 flex items-center gap-1.5" }, e(Play, { size: 12 }), " Open")
            )
          )
        )
      );
    }

    createRoot(document.getElementById("root")).render(e(FigmaPortfolio));
  </script>
</body>
</html>
